<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>SurfFit - Train Your Pop-Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="headline">Train your<span>Pop-Up</span></h1>
            <p class="camera-hint">Platziere deinen Laptop seitlich zum Trainingsort, so dass die Kamera dich im Liegen komplett erfasst</p>
        </header>

        <div class="start-buttons">
            <a href="movenet/" class="start-btn">
                <button class="btn">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                    START
                </button>
                <span class="hint">Lightning - schnell & reaktiv</span>
            </a>

            <a href="blazepose/" class="start-btn">
                <button class="btn">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="3"/>
                        <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    START
                </button>
                <span class="hint">Precision - genau & stabil</span>
            </a>
        </div>
    </div>
</body>
</html>
