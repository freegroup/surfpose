<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>SurfFit - Precision Mode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
    <!-- Main Layout -->
    <div class="app-layout">
        <!-- Header -->
        <header class="app-header">
            <a href="../" class="brand">SURFPOP</a>
            <div class="header-actions">
                <button class="btn-icon" id="btn-debug" title="Debug">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="4"/>
                        <line x1="12" y1="2" x2="12" y2="4"/>
                        <line x1="12" y1="20" x2="12" y2="22"/>
                        <line x1="2" y1="12" x2="4" y2="12"/>
                        <line x1="20" y1="12" x2="22" y2="12"/>
                    </svg>
                </button>
                <div class="status-dot" id="status-dot"></div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Video Area -->
            <div class="video-container">
                <video id="video" autoplay playsinline muted></video>
                <canvas id="skeleton-canvas"></canvas>

                <!-- Celebration Overlay -->
                <div class="celebration hidden" id="celebration">
                    <span class="celebration-text">YEAH!</span>
                    <span class="celebration-emoji">👍</span>
                </div>

                <!-- Timer Overlay -->
                <div class="timer-overlay" id="timer-overlay">
                    <span class="timer-value" id="timer-value">0.00</span>
                </div>
            </div>

            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="stat-card">
                    <span class="stat-label">BEST</span>
                    <span class="stat-value" id="best-time">—</span>
                </div>

                <div class="stat-card">
                    <span class="stat-label">REPS</span>
                    <span class="stat-value" id="reps-count">0</span>
                </div>

                <div class="instructions">
                    <div class="instruction-item">
                        <span>Hinlegen</span>
                        <span class="arrow down">↘</span>
                    </div>
                    <div class="instruction-sub">Timer startet</div>
                    <div class="instruction-item">
                        <span>Aufstehen</span>
                        <span class="arrow up">↗</span>
                    </div>
                    <div class="instruction-sub">Timer stoppt</div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Debug Panel -->
    <div class="debug-panel hidden" id="debug-panel">
        <div class="debug-header">
            <span>Debug Info</span>
            <button class="debug-close" id="debug-close">×</button>
        </div>
        <div class="debug-content">
            <div class="debug-row"><span>Model</span><span>BlazePose Full</span></div>
            <div class="debug-row"><span>Backend</span><span id="debug-backend">-</span></div>
            <div class="debug-row"><span>Video</span><span id="debug-video">-</span></div>
            <div class="debug-row"><span>FPS</span><span id="debug-fps">-</span></div>
            <div class="debug-row"><span>Keypoints</span><span id="debug-keypoints">-</span></div>
            <div class="debug-row"><span>Pose</span><span id="debug-pose">-</span></div>
            <div class="debug-row"><span>V-Diff</span><span id="debug-vdiff">-</span></div>
            <div class="debug-row"><span>Angle</span><span id="debug-angle">-</span></div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text" id="loading-text">Lade BlazePose Full...</div>
        </div>
    </div>

    <!-- Keypoint Smoother -->
    <script src="../lib/keypoint-smoother.js"></script>
    <!-- MediaPipe for BlazePose -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.17.0/dist/tf-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.17.0/dist/tf-backend-webgl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
